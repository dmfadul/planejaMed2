<div class="modal fade" id="balanceConfirmModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Confirmar ajuste</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p>Você deseja confirmar esta ação?</p>

        <ul>
          <li><strong>Centro:</strong> <span id="balance-modal-center"></span></li>
          <li><strong>Dia:</strong> <span id="balance-modal-day"></span></li>
          <li><strong>Período:</strong> <span id="balance-modal-period"></span></li>
          <li><strong>Valor:</strong> <span id="balance-modal-value"></span></li>
        </ul>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button type="button" class="btn btn-primary" id="balance-confirm-button">
          Confirmar
        </button>
      </div>

    </div>
  </div>
</div>
