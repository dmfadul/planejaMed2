<div class="modal fade custom-modal" id="balanceConfirmModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content text-dark">

      <div class="modal-header">
        <h5 class="modal-title">Confirmar Pedido</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p>Você está pedindo Inclusão para:</p>

        <ul>
          <li><strong>Centro:</strong> <span id="balance-modal-center"></span></li>
          <li><strong>Dia:</strong> <span id="balance-modal-day"></span></li>
          <li><strong>Mês:</strong> <span id="balance-modal-month"></span></li>
          <li><strong>Hora início:</strong> <span id="balance-modal-start-hour"></span></li>
          <li><strong>Hora fim:</strong> <span id="balance-modal-end-hour"></span></li>
        </ul>
      </div>

      <div id="balance-modal-errors" class="alert alert-danger d-none"></div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button type="button" class="btn btn-primary" id="balance-confirm-button">
          Confirmar
        </button>
      </div>

    </div>
  </div>
</div>
