<div class="modal fade" id="monthlyFinanceModal" tabindex="-1" aria-labelledby="monthlyFinanceModalLabel" aria-hidden="true" data-bs-theme="dark">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content finance-modal-content">

      <div class="modal-header">
        <div>
          <h5 class="modal-title" id="monthlyFinanceModalLabel">
            My monthly hours
          </h5>
          <small class="text-muted" id="financeModalSubtitle"></small>
        </div>

        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">

        <div id="financeModalLoading" class="text-center py-4 d-none">
          Loading...
        </div>

        <div id="financeModalError" class="alert alert-danger d-none"></div>

        <div id="financeModalContent" class="d-none">

          <section class="finance-hours-summary mb-3">
            <span class="finance-muted-label">Total monthly hours</span>
            <strong id="financeTotalHours">0h</strong>
          </section>

          <section class="finance-hours-section">
            <div class="finance-section-header">
              <h6>Centers</h6>
              <span>Routine / urgency</span>
            </div>

            <div id="financeCentersList" class="finance-centers-list"></div>
          </section>

        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Close
        </button>
      </div>

    </div>
  </div>
</div>
