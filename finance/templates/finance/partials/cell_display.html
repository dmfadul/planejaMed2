{% if editable %}
<td
  class="finance-cell editable-cell"
  hx-get="{% url 'finance:edit_cell' selected_grid_key month.id user.id column.key %}"
  hx-trigger="click"
  hx-target="this"
  hx-swap="outerHTML"
>
  {{ value }}
</td>
{% else %}
<td class="finance-cell protected-cell">
  {{ value }}
</td>
{% endif %}
